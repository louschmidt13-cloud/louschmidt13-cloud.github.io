    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#0A0A0F; --surface:#111118; --border:#1A1A2E;
      --text:#E8E8F0; --muted:#666; --cyan:#00D4FF;
      --purple:#A855F7; --orange:#FF6B35; --green:#22C55E;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      overscroll-behavior:none;}

    /* ── LAYOUT ── */
    #app{display:flex;flex-direction:column;height:100%;height:100dvh;}
    #header{
      background:linear-gradient(135deg,#0A0A0F,#1A1025 60%,#0F1A2E);
      border-bottom:1px solid var(--border);
      padding:calc(var(--safe-top) + 14px) 16px 14px;
      flex-shrink:0;
    }
    #scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--safe-bottom) + 80px);}
    #bottom-nav{
      position:fixed;bottom:0;left:0;right:0;
      background:rgba(10,10,15,0.95);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-top:1px solid var(--border);
      padding:8px 0 calc(var(--safe-bottom) + 4px);
      display:flex;z-index:100;
    }
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
      padding:6px 0;background:none;border:none;color:var(--muted);cursor:pointer;
      font-size:10px;letter-spacing:.5px;}
    .nav-btn .nav-icon{font-size:20px;}
    .nav-btn.active{color:var(--cyan);}

    /* ── HEADER ── */
    #header h1{
      font-size:22px;font-weight:300;
      background:linear-gradient(135deg,#fff 0%,#A855F7 50%,#00D4FF 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      margin-bottom:4px;
    }
    #header .sub{color:var(--muted);font-size:11px;}
    .progress-bar-wrap{margin-top:10px;background:#111;border-radius:3px;height:3px;}
    .progress-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width .5s;}
    .progress-label{display:flex;justify-content:space-between;margin-top:4px;}
    .progress-label span{font-size:10px;color:var(--muted);}
    #progress-pct{color:var(--cyan);}

    /* ── PHASE PILLS ── */
    .phase-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
    .phase-pill{background:var(--surface);border:1px solid var(--border);border-radius:10px;
      padding:12px 10px;cursor:pointer;text-align:left;color:var(--text);width:100%;}
    .phase-pill.active{background:linear-gradient(135deg,var(--pill-accent),#111);}
    .phase-pill .pill-icon{font-size:18px;margin-bottom:4px;}
    .phase-pill .pill-title{font-size:12px;font-weight:600;color:var(--muted);}
    .phase-pill.active .pill-title{color:var(--pill-color);}
    .phase-pill .pill-sub{font-size:10px;color:#333;margin-top:2px;}

    /* ── GOAL BANNER ── */
    .goal-banner{border-radius:8px;padding:10px 14px;margin-bottom:14px;border-left-width:3px;border-left-style:solid;border:1px solid;border-left-width:3px;}
    .goal-banner .goal-label{font-size:9px;letter-spacing:3px;margin-bottom:3px;}
    .goal-banner .goal-text{font-size:12px;color:#bbb;line-height:1.5;}

    /* ── WEEK TABS ── */
    .week-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;overflow-x:auto;
      -webkit-overflow-scrolling:touch;padding-bottom:2px;}
    .week-tab{background:var(--surface);border:1px solid var(--border);border-radius:6px;
      padding:6px 12px;cursor:pointer;font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;}
    .week-tab.active{font-weight:700;}
    .week-theme{font-size:14px;font-weight:400;color:#ccc;margin-bottom:14px;line-height:1.4;}

    /* ── TASKS ── */
    .task-list{display:flex;flex-direction:column;gap:8px;}
    .task-card{border-radius:10px;overflow:hidden;border:1px solid var(--border);
      background:rgba(255,255,255,0.015);transition:border-color .2s;}
    .task-card.open{background:rgba(0,50,80,.15);}
    .task-card.done{background:rgba(0,255,0,0.01);}

    .task-row{display:flex;align-items:center;gap:10px;padding:12px 12px;}
    .check-btn{width:30px;height:30px;border-radius:7px;border:1px solid #2A2A3E;
      background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:700;color:#444;cursor:pointer;flex-shrink:0;transition:all .2s;}
    .check-btn.checked{font-weight:700;color:#000;}
    .task-info{flex:1;min-width:0;}
    .task-text{font-size:13px;line-height:1.4;color:#ddd;margin-bottom:5px;}
    .task-card.done .task-text{text-decoration:line-through;color:#555;}
    .task-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .badge{font-size:10px;padding:2px 7px;border-radius:4px;white-space:nowrap;}
    .badge-time{color:var(--muted);}
    .badge-type{border:1px solid;}
    .badge-lang{border-radius:4px;padding:2px 6px;font-size:10px;}
    .open-btn{flex-shrink:0;padding:7px 12px;border-radius:7px;cursor:pointer;
      font-size:12px;font-weight:700;border:1px solid;transition:all .2s;white-space:nowrap;}

    /* ── RESOURCE PANEL ── */
    .res-panel{border-top:1px solid rgba(0,212,255,0.2);}
    .res-bar{padding:8px 12px;background:rgba(0,0,0,0.3);display:flex;
      align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
    .res-name{font-size:11px;color:#888;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .res-open{font-size:11px;padding:5px 11px;border-radius:5px;text-decoration:none;
      font-weight:700;flex-shrink:0;display:inline-block;}
    .res-tip{padding:10px 12px 0;font-size:11px;color:#666;font-style:italic;line-height:1.6;}
    .yt-wrap{padding:12px;position:relative;padding-bottom:calc(56.25% + 24px);}
    .yt-wrap iframe{position:absolute;top:12px;left:12px;right:12px;width:calc(100% - 24px);height:calc(56.25% - 12px);}
    .web-wrap{padding:12px;}
    .fake-browser{border-radius:8px;overflow:hidden;border:1px solid rgba(0,212,255,0.3);}
    .browser-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#141420;}
    .browser-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .browser-url{flex:1;background:#0A0A0F;border-radius:4px;padding:3px 8px;
      font-size:10px;color:#333;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .web-frame{width:100%;height:380px;border:none;display:block;background:#fff;}

    /* ── INFO TAB ── */
    .info-section{border-radius:10px;padding:14px 16px;margin-bottom:12px;
      border:1px solid;border-left-width:3px;border-left-style:solid;}
    .info-title{font-size:13px;font-weight:600;margin-bottom:10px;}
    .info-item{display:flex;gap:8px;margin-bottom:7px;}
    .info-arrow{flex-shrink:0;font-size:13px;}
    .info-text{font-size:12px;color:#999;line-height:1.5;}

    /* ── EMPTY STATE ── */
    .empty{text-align:center;padding:40px 20px;color:var(--muted);}
    .empty .e-icon{font-size:48px;margin-bottom:12px;}
  </style>
</head>

// ─────────────────────────────────────────────
// STATE  (persisted in localStorage)
// ─────────────────────────────────────────────
let state = {
  tab: "plan",
  phaseIdx: 0,
  weekIdx: 0,
  checked: {},   // key → true
  openKey: null,
};

function save() { try { localStorage.setItem("ki_state", JSON.stringify(state)); } catch(e){} }
function load() {
  try {
    const s = JSON.parse(localStorage.getItem("ki_state")||"{}");
    if (s.checked) state.checked = s.checked;
    if (typeof s.phaseIdx === "number") state.phaseIdx = s.phaseIdx;
    if (typeof s.weekIdx  === "number") state.weekIdx  = s.weekIdx;
    if (typeof s.tab === "string")      state.tab       = s.tab;
  } catch(e){}
}

// ─────────────────────────────────────────────
// PROGRESS
// ─────────────────────────────────────────────
function totalTasks() { return phases.reduce((s,p) => s + p.weeks.reduce((ss,w) => ss + w.tasks.length, 0), 0); }
function doneTasks()  { return Object.values(state.checked).filter(Boolean).length; }
function updateProgress() {
  const total = totalTasks(), done = doneTasks();
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("prog-fill").style.width = pct+"%";
  document.getElementById("prog-tasks").textContent = done+"/"+total+" Aufgaben";
  document.getElementById("progress-pct").textContent = pct+"%";
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function taskKey(phI, wkI, tI) { return `${phI}-${wkI}-${tI}`; }

function renderPlan() {
  const ph = phases[state.phaseIdx];
  const wk = ph.weeks[state.weekIdx];

  let html = "";

  // Phase pills
  html += '<div class="phase-grid">';
  phases.forEach((p, i) => {
    const act = i === state.phaseIdx;
    html += `<button class="phase-pill${act?" active":""}" style="--pill-color:${p.color};--pill-accent:${p.accent};${act?"border-color:"+p.color+";":""}" onclick="selectPhase(${i})">
      <div class="pill-icon">${p.icon}</div>
      <div class="pill-title">Phase ${p.id}: ${p.title}</div>
      <div class="pill-sub">${p.sub}</div>
    </button>`;
  });
  html += "</div>";

  // Goal banner
  html += `<div class="goal-banner" style="border-color:${ph.color}33;border-left-color:${ph.color};background:${ph.accent};">
    <div class="goal-label" style="color:${ph.color};font-size:9px;letter-spacing:3px;">PHASENZIEL</div>
    <div class="goal-text">${ph.goal}</div>
  </div>`;

  // Week tabs
  html += '<div class="week-tabs">';
  ph.weeks.forEach((w, i) => {
    const act = i === state.weekIdx;
    html += `<button class="week-tab${act?" active":""}" style="${act?`background:${ph.color};color:#000;border-color:${ph.color};`:""}" onclick="selectWeek(${i})">${w.week}</button>`;
  });
  html += "</div>";

  html += `<div class="week-theme">${wk.theme}</div>`;

  // Tasks
  html += '<div class="task-list">';
  wk.tasks.forEach((t, i) => {
    const key   = taskKey(state.phaseIdx, state.weekIdx, i);
    const done  = !!state.checked[key];
    const isOpen = state.openKey === key;
    const tc    = typeConf[t.type];
    const lc    = langConf[t.lang] || langConf.de;

    html += `<div class="task-card${done?" done":""}${isOpen?" open":""}" style="${isOpen?"border-color:"+ph.color+"66;":""}">
      <div class="task-row">
        <button class="check-btn${done?" checked":""}" style="${done?`background:${ph.color};border-color:${ph.color};`:""}" onclick="toggleCheck('${key}')">${done?"✓":t.day}</button>
        <div class="task-info">
          <div class="task-text">${t.task}</div>
          <div class="task-badges">
            <span class="badge badge-time">⏱ ${t.time}</span>
            <span class="badge badge-type" style="color:${tc.color};background:${tc.bg};border-color:${tc.color}33;">${tc.badge}</span>
            <span class="badge-lang" style="color:${lc.color};background:${lc.bg};">${lc.label}</span>
          </div>
        </div>
        <button class="open-btn" style="color:${isOpen?"#000":ph.color};background:${isOpen?ph.color:"transparent"};border-color:${ph.color}${isOpen?"":"55"};" onclick="toggleOpen('${key}')">${isOpen?"✕":""+tc.icon+" Öffnen"}</button>
      </div>`;

    if (isOpen) {
      html += `<div class="res-panel" style="border-top-color:${ph.color}33;">
        <div class="res-bar">
          <span class="res-name">${tc.icon} ${t.res}</span>
          <a class="res-open" href="${t.url}" target="_blank" style="background:${tc.color};color:#000;">↗ Öffnen</a>
        </div>
        <div class="res-tip">💡 ${t.tip}</div>`;

      if (t.type === "youtube" && t.id) {
        html += `<div style="padding:12px;position:relative;padding-bottom:calc(56.25% + 12px);">
          <iframe src="https://www.youtube.com/embed/${t.id}?rel=0&modestbranding=1" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen style="position:absolute;top:12px;left:12px;width:calc(100% - 24px);height:calc(56.25% + 0px);border-radius:8px;border:1px solid ${ph.color}44;"></iframe>
        </div>`;
      } else {
        html += `<div class="web-wrap">
          <div class="fake-browser">
            <div class="browser-bar">
              <div class="browser-dot" style="background:#FF5F57;"></div>
              <div class="browser-dot" style="background:#FFBD2E;"></div>
              <div class="browser-dot" style="background:#28C840;"></div>
              <div class="browser-url">${t.url}</div>
            </div>
            <iframe src="${t.url}" class="web-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
          </div>
        </div>`;
      }
      html += "</div>";
    }

    html += "</div>";
  });
  html += "</div>";
  return html;
}

  return sections.map(s => `
    <div class="info-section" style="border-color:${s.color}22;border-left-color:${s.color};background:rgba(0,0,0,0.2);">
      <div class="info-title" style="color:${s.color};">${s.title}</div>
      ${s.items.map(it => `<div class="info-item"><span class="info-arrow" style="color:${s.color};">→</span><span class="info-text">${it}</span></div>`).join("")}
    </div>`).join("");
}

function render() {
  const scroll = document.getElementById("scroll");
  scroll.innerHTML = state.tab === "plan" ? renderPlan() : renderInfo();
  updateProgress();
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  render(); save();
}
function selectPhase(i) { state.phaseIdx = i; state.weekIdx = 0; state.openKey = null; render(); save(); }
function selectWeek(i)  { state.weekIdx = i; state.openKey = null; render(); save(); }
function toggleCheck(key) {
  state.checked[key] = !state.checked[key];
  if (!state.checked[key]) delete state.checked[key];
  render(); save();
}
function toggleOpen(key) {
  state.openKey = state.openKey === key ? null : key;
  render(); save();
  // scroll to opened card after a tick
  if (state.openKey) setTimeout(() => {
    const cards = document.querySelectorAll(".task-card.open");
    if (cards.length) cards[0].scrollIntoView({behavior:"smooth", block:"start"});
  }, 80);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
load();
render();

// Service Worker registrieren (für Offline)
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
</html>
